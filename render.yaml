# One-click deploy to Render.com (https://render.com)
# 1. Push this folder to a GitHub repo.
# 2. On Render: New + > Blueprint > pick your repo. Render reads this file.
services:
  - type: web
    name: proimplant
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/settings
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@proimplant.az
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: proimplant-data
      mountPath: /var/data
      sizeGB: 1
